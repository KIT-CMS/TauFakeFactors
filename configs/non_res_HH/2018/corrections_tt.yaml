      mt_tot:
        <<: [*mt_tot, *QCD_jsplit]
        equipopulated_binning_options:
          <<: [*mt_tot__eq_bin_opt, *QCD_subleading_var_dependence_n_bins]
        bandwidth:
          ">=2": 30.0
        var_bins:
          ">=2": [0.0, 91.59, 112.17, 127.98, 144.2, 169.17, 250.0]
      pt_vis:
        <<: [*pt_vis, *QCD_jsplit]
        equipopulated_binning_options:
          <<: [*pt_vis__eq_bin_opt, *QCD_subleading_var_dependence_n_bins]
        var_bins:
