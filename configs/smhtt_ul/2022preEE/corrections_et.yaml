          ">=1": [0.02, 0.021093, 0.022234, 0.023463, 0.024434, 0.025861, 0.027183, 0.028868, 0.030713, 0.032594, 0.03447, 0.035941, 0.038311, 0.04029, 0.042785, 0.045592, 0.048898, 0.052454, 0.056451, 0.060761, 0.06719, 0.07321, 0.082569, 0.098024, 0.117116, 0.15]
