        equipopulated_binning_options:
          <<: [*iso_1__eq_bin_opt, *QCD_var_dependence_n_bins]
        bandwidth: 0.03
        var_bins:
          "==0": [0.02, 0.022946, 0.025988, 0.028733, 0.032315, 0.03589, 0.04011, 0.044668, 0.050063, 0.056015, 0.06342, 0.072931, 0.083879, 0.098518, 0.122472, 0.15]
