        equipopulated_binning_options:
          <<: [*mass_2__eq_bin_opt, *QCD_var_dependence_n_bins]
        bandwidth: 0.3
        var_bins:
          "==0": [0.0, 0.2, 0.4783, 0.5635, 0.6514, 0.7295, 0.7979, 0.8579, 0.916, 0.9624, 1.0059, 1.0664, 1.124, 1.1836, 1.2607, 1.3691, 2.0]
