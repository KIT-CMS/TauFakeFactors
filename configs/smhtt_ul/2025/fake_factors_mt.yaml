      ">=2": [20.0, 21.3, 22.8, 24.53, 26.61, 29.23, 32.51, 36.95, 43.55, 57.26, 150.0]
    # fit_option: ["poly_0", "poly_1", "poly_2", "poly_3"]
    fit_option: "smoothed"
    bandwidth: 20.0

  Wjets:
    split_categories:
      njets: ["==0", "==1", ">=2"]
    split_categories_binedges:
