      ">=2": [20.0, 21.67, 23.38, 25.49, 27.88, 30.68, 34.3, 39.11, 46.12, 60.07, 150.0]
    # fit_option: ["poly_0", "poly_1", "poly_2", "poly_3"]
    fit_option: "smoothed"
