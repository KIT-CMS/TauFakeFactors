channel: mt
target_processes:
  QCD:
    split_categories:
      njets: ["==0", "==1", ">=2"]
    split_categories_binedges:
      njets: [-0.5, 0.5, 1.5, 22.5]
    equipopulated_binning_options:
      variable_config:
        pt_2:
          min: 20.0
          max: 150.0
          rounding: 2
      var_dependence_n_bins: [40, 25, 10]

    SRlike_cuts:
      had_tau_id_vs_jet: (id_tau_vsJet_Medium_2 > 0.5)
      # -------------------------------------------
      lep_mt: (mt_1 < 50)
      nbtag: (nbtag >= 0)
      tau_pair_sign: ((q_1*q_2) > 0)
      lep_iso: (iso_1 < 0.15)
      # -------------------------------------------
      no_extra_lep: (extramuon_veto < 0.5) && (extraelec_veto < 0.5) && (dilepton_veto < 0.5)

    ARlike_cuts:
      had_tau_id_vs_jet: (id_tau_vsJet_VVVLoose_2 > 0.5) && (id_tau_vsJet_Medium_2 < 0.5)
      # -------------------------------------------
      lep_mt: (mt_1 < 50)
      nbtag: (nbtag >= 0)
      tau_pair_sign: ((q_1*q_2) > 0)
      lep_iso: (iso_1 < 0.15)
      # -------------------------------------------
      no_extra_lep: (extramuon_veto < 0.5) && (extraelec_veto < 0.5) && (dilepton_veto < 0.5)

    var_dependence: pt_2
    # in case of individual splitting
    var_bins:
      "==0": [20.0, 20.34, 20.69, 21.03, 21.4, 21.76, 22.13, 22.52, 22.92, 23.31, 23.72, 24.14, 24.58, 25.01, 25.49, 25.97, 26.48, 27.0, 27.51, 28.08, 28.68, 29.3, 29.9, 30.56, 31.22, 32.01, 32.78, 33.64, 34.56, 35.47, 36.57, 37.73, 39.14, 40.66, 42.48, 44.57, 46.96, 50.52, 55.99, 65.77, 150.0]
      "==1": [20.0, 20.45, 20.91, 21.39, 21.9, 22.43, 23.02, 23.64, 24.29, 25.07, 25.85, 26.72, 27.63, 28.66, 29.73, 30.98, 32.32, 33.9, 35.67, 37.76, 40.28, 43.43, 48.12, 55.08, 70.98, 150.0]
      ">=2": [20.0, 21.4, 22.91, 24.65, 26.92, 29.63, 32.71, 36.73, 43.88, 57.36, 150.0]
    # fit_option: ["poly_0", "poly_1", "poly_2", "poly_3"]
    fit_option: "smoothed"
    bandwidth: 20.0

  Wjets:
    split_categories:
      njets: ["==0", "==1", ">=2"]
    split_categories_binedges:
      njets: [-0.5, 0.5, 1.5, 22.5]
    equipopulated_binning_options:
