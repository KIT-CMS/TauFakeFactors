      ">=2": [20.0, 21.36, 22.88, 24.63, 26.9, 29.56, 32.63, 36.69, 43.93, 58.38, 150.0]
    # fit_option: ["poly_0", "poly_1", "poly_2", "poly_3"]
    fit_option: "smoothed"
    bandwidth: 20.0

  Wjets:
    split_categories:
      njets: ["==0", "==1", ">=2"]
    split_categories_binedges:
