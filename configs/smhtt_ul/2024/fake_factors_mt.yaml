channel: mt
target_processes:
  QCD:
    split_categories:
      njets: ["==0", "==1", ">=2"]
    split_categories_binedges:
      njets: [-0.5, 0.5, 1.5, 22.5]
    equipopulated_binning_options:
      variable_config:
        pt_2:
          min: 20.0
          max: 150.0
          rounding: 2
      var_dependence_n_bins: [40, 25, 10]

    SRlike_cuts:
      had_tau_id_vs_jet: (id_tau_vsJet_Medium_2 > 0.5)
      # -------------------------------------------
      lep_mt: (mt_1 < 50)
      nbtag: (nbtag >= 0)
      tau_pair_sign: ((q_1*q_2) > 0)
      lep_iso: ((iso_1 >= 0.05) && (iso_1 <= 0.15))
      # -------------------------------------------
      no_extra_lep: (extramuon_veto < 0.5) && (extraelec_veto < 0.5) && (dilepton_veto < 0.5)

    ARlike_cuts:
      had_tau_id_vs_jet: (id_tau_vsJet_VVVLoose_2 > 0.5) && (id_tau_vsJet_Medium_2 < 0.5)
      # -------------------------------------------
      lep_mt: (mt_1 < 50)
      nbtag: (nbtag >= 0)
      tau_pair_sign: ((q_1*q_2) > 0)
      lep_iso: ((iso_1 >= 0.05) && (iso_1 <= 0.15))
      # -------------------------------------------
      no_extra_lep: (extramuon_veto < 0.5) && (extraelec_veto < 0.5) && (dilepton_veto < 0.5)

    var_dependence: pt_2
    # in case of individual splitting
    var_bins:
      "==0": [20.0, 20.37, 20.75, 21.13, 21.51, 21.88, 22.3, 22.72, 23.15, 23.57, 24.01, 24.47, 24.94, 25.44, 25.95, 26.49, 26.99, 27.55, 28.11, 28.67, 29.28, 29.97, 30.64, 31.31, 32.05, 32.92, 33.73, 34.62, 35.63, 36.72, 37.87, 39.14, 40.54, 42.02, 43.84, 46.1, 48.57, 51.98, 56.94, 65.49, 150.0]
      "==1": [20.0, 20.43, 20.86, 21.33, 21.8, 22.37, 22.95, 23.59, 24.24, 24.88, 25.59, 26.45, 27.32, 28.29, 29.32, 30.44, 31.7, 33.18, 34.96, 37.07, 39.7, 43.0, 47.56, 53.94, 66.27, 150.0]
      ">=2": [20.0, 21.22, 22.69, 24.46, 26.56, 29.01, 32.49, 36.5, 42.29, 55.79, 150.0]
    # fit_option: ["poly_0", "poly_1", "poly_2", "poly_3"]
    fit_option: "smoothed"
    bandwidth: 10.0

  Wjets:
    split_categories:
      njets: ["==0", "==1", ">=2"]
    split_categories_binedges:
      njets: [-0.5, 0.5, 1.5, 22.5]
    equipopulated_binning_options:
      variable_config:
