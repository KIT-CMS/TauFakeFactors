      ">=2": [20.0, 21.42, 23.15, 25.16, 27.57, 30.43, 34.2, 38.5, 45.93, 60.29, 150.0]
    # fit_option: ["poly_0", "poly_1", "poly_2", "poly_3"]
    fit_option: "smoothed"
