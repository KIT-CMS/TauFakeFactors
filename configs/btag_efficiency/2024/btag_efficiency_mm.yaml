# Config file for btag efficiency calculation (era 2024)
# Settings in common_settings.yaml (same directory) are loaded automatically
# and can be overridden here.

# ------------------------------------------------------------------
# Jet column names as they appear in the input ROOT trees
# ------------------------------------------------------------------
jet_pt_column: "jet_pt_vec"
jet_eta_column: "jet_eta_vec"
jet_flavor_column: "jet_hadronflavour_vec"
jet_btag_column: "jet_btag_value_vec"

# Optional additional per-jet selection applied before counting
# (uses C++ syntax; leave empty string "" to apply no extra selection)
# jet_selection: "jet_pt > 20 && abs(jet_eta) < 2.4"

# ------------------------------------------------------------------
# B-tagging working points: discriminator cut values (DeepJet / Run3 2024)
# ------------------------------------------------------------------
# https://btv-wiki.docs.cern.ch/ScaleFactors/Run3Summer24/#ak4-b-tagging
btag_working_points: 
  L: 0.0246
  M: 0.1272
  T: 0.4648
  XT: 0.6298
  XXT: 0.9739

# ------------------------------------------------------------------
# Jet flavour categories (Jet_hadronFlavour values)
#   b     -> bottom jets (hadronFlavour == 5)
#   c     -> charm jets  (hadronFlavour == 4)
#   light -> light/udsg jets (hadronFlavour == 0)
# ------------------------------------------------------------------
jet_flavor_categories:
  b: 5
  c: 4
  light: 0

# ------------------------------------------------------------------
# General binning for the efficiency measurement
# ------------------------------------------------------------------
# Jet pT bins [GeV]
jet_pt_bins: [20, 30, 50, 70, 100, 140, 200, 300, 600, 1000]

# Jet |eta| bins
jet_eta_bins: [0.0, 1.4, 2.5]

# ------------------------------------------------------------------
# Processes (sample types).
# For each entry the script searches for ROOT files matching
#   {file_path}/{channel}/{process}*.root
# where {channel} is taken from the channel list below.
# All matching files are chained together for a single sample type.
# ------------------------------------------------------------------
channel: mm

# ------------------------------------------------------------------
# Mapping from process name (used for file discovery) to the sample
# type label that is used as the key in the correctionlib output.
# ------------------------------------------------------------------
processes:
  ttbar:
    sample_type: "ttbar"
    jet_pt_bins: [30, 50, 70, 100, 140, 200, 300, 1000]
    # jet_eta_bins: [0.0, 0.3, 0.6, 0.9, 1.2, 1.5, 1.8, 2.1, 2.5]
  DYjets:
    sample_type: "dyjets"
    jet_pt_bins: [30, 50, 70, 100, 140, 200, 300, 1000]
    # jet_eta_bins: [0.0, 0.4, 0.9, 1.3, 1.8, 2.5]
  ST:
    sample_type: "singletop"
    jet_pt_bins: [30, 50, 70, 100, 140, 200, 300, 1000]
    # jet_eta_bins: [0.0, 0.5, 1.0, 1.7, 2.5]
  Wjets:
    sample_type: "wjets"
    jet_pt_bins: [30, 50, 70, 140, 1000]
    jet_eta_bins: [0.0, 2.5]
  diboson:
    sample_type: "diboson"
    jet_pt_bins: [30, 50, 70, 100, 140, 200, 300, 1000]
    # jet_eta_bins: [0.0, 0.4, 0.9, 1.5, 2.5]
  ggH:
    sample_type: "ggh_htautau"
    jet_pt_bins: [30, 50, 70, 100, 140, 200, 300, 1000]
    # jet_eta_bins: [0.0, 0.9, 1.2, 2.5]
  qqH:
    sample_type: "vbf_htautau"
    jet_pt_bins: [30, 50, 70, 100, 140, 200, 300, 1000]
    # jet_eta_bins: [0.0, 0.9, 1.2, 2.5]
  rem_higgs:
    sample_type: "rem_htautau"
    jet_pt_bins: [30, 50, 70, 100, 140, 200, 300, 1000]
    # jet_eta_bins: [0.0, 0.9, 1.2, 2.5]